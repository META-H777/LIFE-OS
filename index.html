<title>LIFE OS 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050508;
  --bg2: #0a0b14;
  --bg3: #0e1019;
  --cyan: #00f0ff;
  --purple: #a855f7;
  --orange: #f97316;
  --green: #34d399;
  --red: #f87171;
  --blue: #38bdf8;
  --w04: rgba(255,255,255,0.03);
  --w06: rgba(255,255,255,0.05);
  --w08: rgba(255,255,255,0.07);
  --w10: rgba(255,255,255,0.09);
  --w15: rgba(255,255,255,0.12);
  --td: rgba(255,255,255,0.35);
  --tm: rgba(255,255,255,0.55);
  --tl: rgba(255,255,255,0.8);
  --fd: 'Orbitron', sans-serif;
  --fb: 'Rajdhani', sans-serif;
  --fm: 'JetBrains Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:#fff;font-family:var(--fb);overflow-x:hidden;-webkit-tap-highlight-color:transparent}
body{max-width:480px;margin:0 auto;position:relative;min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(0,240,255,0.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(168,85,247,0.03) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(21,24,53,0.5) 0%,transparent 80%)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}

.page{padding:14px 14px 130px;animation:fadeUp 0.3s ease}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;justify-content:space-around;padding:8px 0 20px;background:linear-gradient(to top,var(--bg) 50%,transparent);z-index:100}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 10px;color:var(--td);transition:all 0.3s}
.nav-btn.active{color:var(--cyan)}
.nav-btn .icon{font-size:20px;transition:all 0.3s}
.nav-btn.active .icon{filter:drop-shadow(0 0 8px var(--cyan))}
.nav-btn .label{font-size:9px;letter-spacing:1.5px;font-family:var(--fb);font-weight:400}
.nav-btn.active .label{font-weight:700}
.nav-btn .dot{width:0;height:2px;background:var(--cyan);border-radius:1px;transition:all 0.3s;margin-top:2px}
.nav-btn.active .dot{width:14px;box-shadow:0 0 8px var(--cyan)}

.glass{background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.015));border-radius:14px;padding:14px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(8px)}
.card-label{font-size:9px;color:var(--tm);letter-spacing:2px;font-family:var(--fb);font-weight:600}
.view-title{font-family:var(--fd);font-size:20px;font-weight:700;letter-spacing:2px;margin-bottom:14px}
.back-btn{background:none;border:none;color:rgba(0,240,255,0.5);cursor:pointer;font-family:var(--fb);font-size:12px;padding:0;margin-bottom:6px;letter-spacing:1px;font-weight:600}
.input-group{background:var(--bg2);border-radius:10px;padding:10px 12px;margin-bottom:6px}
.input-label{display:block;font-size:9px;color:var(--tm);letter-spacing:1px;font-family:var(--fb);font-weight:600;margin-bottom:4px}
.input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 10px;color:#fff;font-family:var(--fm);font-size:13px;outline:none}
.input:focus{border-color:rgba(0,240,255,0.4);box-shadow:0 0 12px rgba(0,240,255,0.08)}
.textarea{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:10px;color:#fff;font-family:var(--fb);font-size:14px;outline:none;resize:vertical;min-height:70px;line-height:1.6}
.textarea:focus{border-color:rgba(0,240,255,0.3)}
.btn-primary{width:100%;padding:12px 0;background:linear-gradient(135deg,rgba(0,240,255,0.08),rgba(168,85,247,0.06));border:1px solid rgba(0,240,255,0.2);border-radius:10px;color:var(--cyan);font-family:var(--fd);font-size:11px;letter-spacing:2px;cursor:pointer;transition:all 0.3s}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:disabled{opacity:0.25;cursor:not-allowed}
.filter-btn{padding:6px 12px;border-radius:8px;font-family:var(--fb);font-size:11px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all 0.3s;background:var(--bg2);border:1px solid var(--w08);color:var(--td)}
.filter-btn.active{background:rgba(0,240,255,0.1);border-color:rgba(0,240,255,0.3);color:var(--cyan)}
.stat-box{background:var(--bg2);border-radius:10px;padding:10px 8px;text-align:center;border:1px solid var(--w06)}
.stat-val{font-family:var(--fd);font-size:15px;font-weight:700}
.stat-label{font-size:7px;color:var(--tm);letter-spacing:1.5px;font-family:var(--fb);margin-top:3px;font-weight:600}
.arrow-btn{background:var(--bg2);border:1px solid var(--w08);border-radius:8px;color:rgba(0,240,255,0.5);padding:4px 10px;cursor:pointer;font-size:14px}
.trade-row{background:var(--bg2);border-radius:10px;padding:9px 11px;margin-bottom:5px;border:1px solid var(--w06)}
.load-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
.load-ring{width:44px;height:44px;border:2px solid var(--w08);border-top:2px solid var(--cyan);border-radius:50%;animation:spin 1s linear infinite}

/* Sport sub-buttons */
.sport-sub{display:flex;gap:4px;margin-top:6px}
.sport-chip{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--w08);background:var(--bg2);color:var(--td);transition:all 0.2s;letter-spacing:0.5px}
.sport-chip.active{background:rgba(0,240,255,0.12);border-color:rgba(0,240,255,0.3);color:var(--cyan)}

/* Notif banner */
.notif-banner{background:linear-gradient(135deg,rgba(0,240,255,0.08),rgba(168,85,247,0.06));border:1px solid rgba(0,240,255,0.15);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;cursor:pointer}
.notif-banner .bell{font-size:22px;animation:pulse 2s infinite}

}

.glass {
  position: relative;
  overflow: visible;
  border: 1px solid rgba(0,240,255,0.06);
  box-shadow: 0 0 8px rgba(0,240,255,0.02), inset 0 1px 0 rgba(0,240,255,0.06), inset 0 -1px 0 rgba(212,168,83,0.03);
}

.input::placeholder { color: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<div id="app">
  <div class="load-screen">
    <div class="load-ring"></div>
    <p style="color:var(--cyan);font-family:var(--fd);margin-top:20px;font-size:12px;letter-spacing:4px">LIFE OS 2026</p>
  </div>
</div>
<nav class="nav" id="navbar"></nav>

<script>

// ═══════════════════════════════════════
// LIFE OS 2026 — v3 Brighter + Notifs
// ═══════════════════════════════════════

const SY=2026;
const FM=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const FS=["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
const FD=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
const FF=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];

const SPORTS = [
  {id:"tapis",label:"Tapis",icon:"🏃"},
  {id:"muscu",label:"Muscu",icon:"🏋️"},
  {id:"padel",label:"Padel",icon:"🎾"},
];

const HABITS=[
  {id:"sport",label:"Sport 30min",desc:"Tapis / Muscu / Padel",icon:"🏋️",color:"#00f0ff",hasSub:true},
  {id:"lecture",label:"Lecture 15min",desc:"Lire chaque jour",icon:"📖",color:"#a855f7"},
  {id:"echecs",label:"Partie d'échecs",desc:"1 partie minimum",icon:"♟️",color:"#f97316"},
  {id:"claude",label:"30min Claude",desc:"Apprentissage IA",icon:"🤖",color:"#38bdf8"},
  {id:"journal",label:"Journal de bord",desc:"Écriture quotidienne",icon:"📝",color:"#34d399"},
];

const db={
  g(k,f){try{const v=localStorage.getItem("lo_"+k);return v?JSON.parse(v):f}catch{return f}},
  s(k,v){try{localStorage.setItem("lo_"+k,JSON.stringify(v))}catch(e){console.error(e)}}
};

let S={
  view:"home",habits:db.g("habits",{}),journals:db.g("journals",{}),
  finances:db.g("finances",{}),trades:db.g("trades",[]),
  selDate:tds(),selMonth:cms(),tradeFilter:"month",
  showTF:false,tf:freshTF(),notifEnabled:db.g("notif",false),
};
function save(){db.s("habits",S.habits);db.s("journals",S.journals);db.s("finances",S.finances);db.s("trades",S.trades)}

function tds(){const d=new Date();return d.getFullYear()<SY?`${SY}-01-01`:d.toISOString().slice(0,10)}
function cms(){const d=new Date();return d.getFullYear()<SY?`${SY}-01`:d.toISOString().slice(0,7)}
function dim(y,m){return new Date(y,m+1,0).getDate()}
function dn(s){return FD[new Date(s+"T12:00:00").getDay()]}
function dnf(s){return FF[new Date(s+"T12:00:00").getDay()]}
function dobj(s){return new Date(s+"T12:00:00")}
function freshTF(){return{date:tds(),pair:"",direction:"LONG",strategie:"",raison:"",entree:"",sortie:"",taille:"",pnl:"",sv:false,checks:[false,false,false,false]}}

function streak(){let c=0,d=new Date(tds()+"T12:00:00");while(true){const s=d.toISOString().slice(0,10);if(s<`${SY}-01-01`)break;const h=S.habits[s]||{};if(HABITS.every(x=>h[x.id])){c++;d.setDate(d.getDate()-1)}else break}return c}
function mhd(ym){const[y,m]=(ym||cms()).split("-").map(Number);const days=dim(y,m-1);return Array.from({length:days},(_,i)=>{const ds=`${y}-${String(m).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`;return HABITS.filter(h=>(S.habits[ds]||{})[h.id]).length})}
function ms26(){return Array.from({length:12},(_,i)=>{const ym=`${SY}-${String(i+1).padStart(2,"0")}`;const days=dim(SY,i);let done=0;for(let d=1;d<=days;d++){const ds=`${ym}-${String(d).padStart(2,"0")}`;done+=HABITS.filter(h=>(S.habits[ds]||{})[h.id]).length}return{month:FS[i],done,total:days*5,pct:days*5>0?done/(days*5):0}})}
function weekDates(ds){const d=new Date(ds+"T12:00:00");const day=d.getDay();const off=day===0?-6:1-day;const mon=new Date(d);mon.setDate(d.getDate()+off);return Array.from({length:7},(_,i)=>{const dd=new Date(mon);dd.setDate(mon.getDate()+i);return dd.toISOString().slice(0,10)})}

// Sport stats for a month
function sportStats(ym) {
  const [y,m]=ym.split("-").map(Number);const days=dim(y,m-1);
  let counts={tapis:0,muscu:0,padel:0};
  for(let d=1;d<=days;d++){
    const ds=`${ym}-${String(d).padStart(2,"0")}`;
    const h=S.habits[ds]||{};
    if(h.sportType){
      if(h.sportType==="tapis")counts.tapis++;
      if(h.sportType==="muscu")counts.muscu++;
      if(h.sportType==="padel")counts.padel++;
    }
  }
  return counts;
}

// ─── NOTIFICATIONS ───
let notifTimers = [];

async function requestNotif() {
  if (!("Notification" in window)) { alert("Ton navigateur ne supporte pas les notifications."); return; }
  const perm = await Notification.requestPermission();
  if (perm === "granted") {
    S.notifEnabled = true;
    db.s("notif", true);
    scheduleNotifs();
    render();
  } else {
    alert("Notifications refusées. Tu peux les activer dans les réglages de ton navigateur.");
  }
}

function scheduleNotifs() {
  notifTimers.forEach(t => clearTimeout(t));
  notifTimers = [];
  if (!S.notifEnabled) return;

  const now = new Date();
  const today = now.toISOString().slice(0, 10);

  // Schedule for 18h
  const at18 = new Date(today + "T18:00:00");
  let ms18 = at18 - now;
  if (ms18 < 0) ms18 += 86400000; // tomorrow
  notifTimers.push(setTimeout(() => {
    new Notification("🔔 LIFE OS — Rappel", { body: "N'oublie pas de tracker tes habitudes à 20h ce soir !", icon: "🎯", tag: "lifeos-18" });
    scheduleNotifs(); // reschedule for next day
  }, ms18));

  // Schedule for 20h
  const at20 = new Date(today + "T20:00:00");
  let ms20 = at20 - now;
  if (ms20 < 0) ms20 += 86400000;

  const dh = S.habits[today] || {};
  const done = HABITS.filter(h => dh[h.id]).length;

  notifTimers.push(setTimeout(() => {
    if (done < 5) {
      new Notification("⚡ LIFE OS — C'est l'heure !", { body: `Tu as complété ${done}/5 habitudes aujourd'hui. Go tracker maintenant !`, icon: "🚀", tag: "lifeos-20" });
    } else {
      new Notification("🏆 LIFE OS — Bravo !", { body: "Toutes tes habitudes sont complétées aujourd'hui ! 💪", icon: "🏆", tag: "lifeos-20" });
    }
    scheduleNotifs();
  }, ms20));
}

// Init notifs on load
if (S.notifEnabled && "Notification" in window && Notification.permission === "granted") {
  scheduleNotifs();
}

// SVG
function svgBar(data,color,h=50){const max=Math.max(...data,1);const w=100/data.length;let b="";data.forEach((v,i)=>{const bh=v>0?Math.max((v/max)*h,2):1;b+=`<rect x="${i*w+0.3}" y="${h-bh}" width="${w-0.6}" height="${bh}" rx="1.5" fill="${color}" opacity="${v>0?0.9:0.08}"/>`});return`<svg viewBox="0 0 100 ${h}" style="width:100%;height:${h}px" preserveAspectRatio="none">${b}</svg>`}
function svgLine(data,color,h=50){if(data.length<2)return"";const max=Math.max(...data),min=Math.min(...data),r=max-min||1;const pts=data.map((v,i)=>`${(i/(data.length-1))*100},${h-((v-min)/r)*(h*0.75)-h*0.12}`).join(" ");const uid="s"+Math.random().toString(36).slice(2,8);return`<svg viewBox="0 0 100 ${h}" style="width:100%;height:${h}px" preserveAspectRatio="none"><defs><linearGradient id="${uid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.25"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><polygon fill="url(#${uid})" points="0,${h} ${pts} 100,${h}"/><polyline fill="none" stroke="${color}" stroke-width="2" points="${pts}" vector-effect="non-scaling-stroke"/></svg>`}
function svgDonut(val,max,color,sz=60,sw=6){const p=max>0?Math.min(val/max,1):0;const r=(sz-sw)/2;const c=2*Math.PI*r;return`<svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--w10)" stroke-width="${sw}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-dasharray="${c}" stroke-dashoffset="${c*(1-p)}" stroke-linecap="round" style="transition:stroke-dashoffset 0.8s ease"/></svg>`}
function pnlB(w,l,h=22){const t=w+Math.abs(l);if(t===0)return`<div style="height:${h}px;background:var(--w08);border-radius:6px"></div>`;const wp=(w/t)*100;return`<div style="display:flex;height:${h}px;border-radius:6px;overflow:hidden;gap:2px">${wp>0?`<div style="width:${wp}%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:6px"></div>`:""}${wp<100?`<div style="flex:1;background:linear-gradient(90deg,var(--red),var(--orange));border-radius:6px"></div>`:""}</div>`}

// ─── RENDER ───
function render(){const app=document.getElementById("app");switch(S.view){case"home":app.innerHTML=rHome();break;case"habits":app.innerHTML=rHabits();break;case"finance":app.innerHTML=rMergedFinance();break;case"trading":app.innerHTML=rTrading();break;case"annual":app.innerHTML=rAnnual();break;case"journal":app.innerHTML=rJournal();break;case"shape":app.innerHTML=rShape();break;case"rules":app.innerHTML=rRulesPage();break;case"settings":app.innerHTML=rSettingsPage();break}rNav();bindNav()}
function rNav(){const items=[{id:"home",icon:"⬡",l:"Home"},{id:"habits",icon:"◎",l:"Habitudes"},{id:"finance",icon:"◈",l:"Finance"},{id:"shape",icon:"○",l:"Shape"}];document.getElementById("navbar").innerHTML=items.map(it=>`<button class="nav-btn ${S.view===it.id?"active":""}" data-nav="${it.id}"><span class="icon">${it.icon}</span><span class="label">${it.l}</span><span class="dot"></span></button>`).join("")}
function nav(v){S.view=v;render();window.scrollTo(0,0)}
function bindNav(){document.querySelectorAll("[data-nav]").forEach(b=>{b.onclick=()=>nav(b.dataset.nav)})}

// ─── HOME ───
function rHome(){
  const today=tds(),td=dobj(today),mi=td.getMonth(),cm=cms();
  const th=S.habits[today]||{},comp=HABITS.filter(h=>th[h.id]).length,sk=streak(),md=mhd();
  const s26=new Date("2026-01-01T00:00:00"),de=Math.max(1,Math.floor((td-s26)/86400000)+1),yp=((de/365)*100).toFixed(1);
  const mt=S.trades.filter(t=>t.date?.startsWith(cm)),tp=mt.reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);
  const tw=mt.filter(t=>(parseFloat(t.pnl)||0)>0).reduce((s,t)=>s+parseFloat(t.pnl),0);
  const tl=Math.abs(mt.filter(t=>(parseFloat(t.pnl)||0)<0).reduce((s,t)=>s+parseFloat(t.pnl),0));
  const fin=S.finances[cm]||{};

  // Sport detail this month
  const sc=sportStats(cm);

  // Notif banner
  const notifBanner = !S.notifEnabled ? `<div class="notif-banner" onclick="requestNotif()"><span class="bell">🔔</span><div><div style="font-weight:700;font-size:13px;color:var(--tl)">Activer les rappels</div><div style="font-size:11px;color:var(--tm)">18h et 20h pour ne rien oublier</div></div><div style="margin-left:auto;color:var(--cyan);font-family:var(--fd);font-size:10px;letter-spacing:1px">ACTIVER</div></div>` :
  `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;margin-bottom:6px"><span style="font-size:14px">🔔</span><span style="font-size:11px;color:var(--green)">Rappels activés · 18h & 20h</span></div>`;

  return`<div class="page">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
    <div><h1 style="font-family:var(--fd);font-size:26px;font-weight:900;letter-spacing:3px;text-shadow:0 0 30px rgba(0,240,255,0.12)">LIFE OS</h1>
    <p style="font-size:13px;color:var(--tm);margin-top:4px;letter-spacing:1px">${dnf(today)} ${td.getDate()} ${FM[mi]} 2026</p></div>
    <div style="text-align:right"><div style="font-size:36px;font-family:var(--fd);color:${sk>0?"var(--cyan)":"rgba(255,255,255,0.12)"};font-weight:900;text-shadow:${sk>0?"0 0 20px rgba(0,240,255,0.35)":"none"};line-height:1">${sk}</div>
    <div style="font-size:9px;color:var(--tm);letter-spacing:2px;font-weight:600">STREAK</div></div>
  </div>

  ${notifBanner}

  <!-- Focus -->
  <div class="glass" style="cursor:pointer;padding:12px 16px" onclick="toggleFocus()"><div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:18px">&#9671;</span><div><div style="font-family:var(--fd);font-size:14px;color:#d4a853;font-weight:700;letter-spacing:2px">4HJ &#8594; 10K/M</div><div style="font-size:9px;color:rgba(255,255,255,0.25);letter-spacing:1px;margin-top:2px">FOCUS &amp; OBJECTIFS</div></div></div><span id="fArr" style="color:#d4a853;font-size:12px">&#9654;</span></div></div>
  <div id="focusDrop" style="display:none">${rFocusContent()}</div>
  <!-- 2026 -->
  <div class="glass" style="padding:10px 14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span class="card-label">2026 — JOUR ${de}/365</span><span style="font-family:var(--fm);font-size:11px;color:rgba(0,240,255,0.6)">${yp}%</span></div>
  <div style="height:5px;background:var(--bg2);border-radius:3px;overflow:hidden"><div style="height:100%;width:${yp}%;background:linear-gradient(90deg,var(--cyan),var(--purple));border-radius:3px"></div></div></div>

  <!-- Today -->
  <div class="glass" style="cursor:pointer" onclick="nav('habits')">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span class="card-label">AUJOURD'HUI</span>
      <span style="font-family:var(--fd);color:${comp===5?"var(--green)":"var(--cyan)"};font-size:18px;font-weight:700">${comp}<span style="color:var(--td);font-size:14px">/5</span></span>
    </div>
    <div style="display:flex;gap:6px">${HABITS.map(h=>{const done=th[h.id];return`<div style="flex:1;text-align:center;padding:8px 0;border-radius:10px;background:${done?h.color+"15":"var(--bg2)"};border:1px solid ${done?h.color+"35":"var(--w06)"}"><div style="font-size:20px;${done?`filter:drop-shadow(0 0 8px ${h.color})`:"filter:grayscale(1) opacity(0.3)"}">${h.icon}</div><div style="width:16px;height:3px;border-radius:2px;margin:6px auto 0;background:${done?h.color:"var(--w08)"};${done?`box-shadow:0 0 8px ${h.color}50`:""}"></div></div>`}).join("")}</div>
    ${th.sport && th.sportType ? `<div style="text-align:center;margin-top:8px;font-size:11px;color:var(--cyan)">Aujourd'hui : <strong>${SPORTS.find(s=>s.id===th.sportType)?.icon||""} ${th.sportType.charAt(0).toUpperCase()+th.sportType.slice(1)}</strong></div>` : ""}
  </div>

  <!-- Month chart -->
  <div class="glass">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span class="card-label">HABITUDES — ${FM[mi].toUpperCase()} 2026</span>
      <span style="font-family:var(--fm);font-size:10px;color:var(--td)">${md.reduce((a,b)=>a+b,0)}/${md.length*5}</span>
    </div>
    ${svgBar(md,"#00f0ff",48)}
  </div>

  <!-- Sport breakdown -->
  <div class="glass" style="padding:10px 14px">
    <span class="card-label">SPORT — ${FS[mi].toUpperCase()} 2026</span>
    <div style="display:flex;gap:8px;margin-top:8px">${SPORTS.map(sp=>`<div style="flex:1;text-align:center;background:var(--bg2);border-radius:10px;padding:8px 4px;border:1px solid var(--w06)"><div style="font-size:18px">${sp.icon}</div><div style="font-family:var(--fd);font-size:16px;color:var(--cyan);font-weight:700;margin-top:4px">${sc[sp.id]}</div><div style="font-size:9px;color:var(--tm);letter-spacing:1px">${sp.label.toUpperCase()}</div></div>`).join("")}</div>
  </div>

  <!-- Finance -->
  <div class="glass" style="cursor:pointer" onclick="nav('finance')">
    <span class="card-label">FINANCE — ${FS[mi].toUpperCase()} 2026</span>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
      ${[{l:"Salaire",k:"salaire",c:"#38bdf8"},{l:"Épargne",k:"epargne",c:"#34d399"},{l:"Crypto",k:"crypto",c:"#a855f7"},{l:"Trading",k:"trading",c:"#f97316"}].map(f=>`<div style="background:var(--bg2);border-radius:10px;padding:8px 10px;border-left:2px solid ${f.c}"><div style="font-size:9px;color:var(--tm);letter-spacing:1px;font-weight:600">${f.l.toUpperCase()}</div><div style="font-size:16px;font-family:var(--fd);color:${fin[f.k]?f.c:"rgba(255,255,255,0.1)"};font-weight:700">${fin[f.k]?Number(fin[f.k]).toLocaleString("fr-FR")+"€":"—"}</div></div>`).join("")}
    </div>
  </div>

  <!-- Trading -->
  <div class="glass" style="cursor:pointer" onclick="nav('trading')">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span class="card-label">TRADING — ${FS[mi].toUpperCase()} 2026</span>
      <span style="font-family:var(--fd);font-size:16px;font-weight:700;color:${tp>=0?"var(--green)":"var(--red)"}">${tp>=0?"+":""}${tp.toFixed(2)}</span>
    </div>
    <div style="font-size:9px;color:var(--td);margin:4px 0 6px">${mt.length} trades ce mois</div>
    ${pnlB(tw,tl)}
    <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;font-family:var(--fm)"><span style="color:var(--green)">+${tw.toFixed(0)} USDT</span><span style="color:var(--red)">-${tl.toFixed(0)} USDT</span></div>
  </div>
  <div style="height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,83,0.08),transparent);margin:16px 0"></div>
  <div style="display:flex;gap:10px;margin-bottom:10px">
    <div class="glass" style="flex:1;cursor:pointer;text-align:center;padding:20px 12px" onclick="nav('annual')"><div style="font-size:24px;margin-bottom:8px">&#9678;</div><div style="font-family:var(--fd);font-size:9px;color:var(--cyan);letter-spacing:2px;font-weight:700">BILAN 2026</div></div>
    <div class="glass" style="flex:1;cursor:pointer;text-align:center;padding:20px 12px" onclick="nav('rules')"><div style="font-size:24px;margin-bottom:8px">&#9671;</div><div style="font-family:var(--fd);font-size:9px;color:#d4a853;letter-spacing:2px;font-weight:700">R&#200;GLES</div></div>
    <div class="glass" style="flex:1;cursor:pointer;text-align:center;padding:20px 12px" onclick="nav('settings')"><div style="font-size:24px;margin-bottom:8px;opacity:0.35">&#9881;</div><div style="font-family:var(--fd);font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:2px;font-weight:700">R&#201;GLAGES</div></div>
  </div>
  </div>`;
}

// ─── HABITS ───
function rHabits(){
  const sel=S.selDate,sd=dobj(sel),dh=S.habits[sel]||{},week=weekDates(sel);
  const ym=sel.slice(0,7),[y,m]=ym.split("-").map(Number),days=dim(y,m-1);
  let mD=0;for(let d=1;d<=days;d++){const ds=`${ym}-${String(d).padStart(2,"0")}`;mD+=HABITS.filter(h=>(S.habits[ds]||{})[h.id]).length}
  const mp=((mD/(days*5))*100).toFixed(0);

  return`<div class="page">
  <button class="back-btn" onclick="nav('home')">← RETOUR</button>
  <h2 class="view-title">HABITUDES</h2>

  o+='<div class="glass"><span class="card-label" style="color:#d4a853">TRANSFORMATION</span><div style="font-size:10px;color:rgba(255,255,255,0.2);margin-top:4px;margin-bottom:12px">1 photo/semaine \u2014 m\u00eame pose</div>';
  o+='<button onclick="shapePhoto()" style="width:100%;padding:12px;border-radius:10px;border:1px solid rgba(0,240,255,0.15);background:rgba(0,240,255,0.03);color:rgba(0,240,255,0.6);font-size:11px;cursor:pointer;margin-bottom:12px">\ud83d\udcf7 AJOUTER</button>';
  if(photos.length>0){o+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';photos.slice().reverse().forEach(function(p,i){var idx=photos.length-1-i;o+='<div style="position:relative;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.04)"><img src="'+p.src+'" style="width:100%;aspect-ratio:3/4;object-fit:cover;display:block"><div style="position:absolute;bottom:0;left:0;right:0;padding:6px 8px;background:linear-gradient(transparent,rgba(0,0,0,0.8))"><span style="font-size:9px;color:rgba(255,255,255,0.6)">'+p.date+'</span></div><button onclick="shapeDelPhoto('+idx+')" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.5);border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:10px;padding:2px 6px;border-radius:4px">\u00d7</button></div>'});o+='</div>'}
  else o+='<div style="text-align:center;padding:30px 0;color:rgba(255,255,255,0.12);font-size:12px">Prends ta premi\u00e8re photo</div>';
  o+='</div>';return o;
}

// ── ACTIONS ──
function shapeSetWeight(v){var d=getShape();if(!d.weights)d.weights={};d.weights[tds()]=parseFloat(v)||0;setShape(d)}
function shapeSetDay(k,v){var d=getShape();if(!d.days)d.days={};var t=tds();if(!d.days[t])d.days[t]={};d.days[t][k]=v;setShape(d);render()}
function shapeToggle(k){
  var d=getShape(),t=tds();if(!d.days)d.days={};if(!d.days[t])d.days[t]={};
  if(k.startsWith("repas_")){
    var meal=k.split("_")[1];if(!d.days[t].repas)d.days[t].repas={};
    d.days[t].repas[meal]=!d.days[t].repas[meal];
  }else{d.days[t][k]=!d.days[t][k]}
  setShape(d);render();
}
function shapeForceDay(k){var d=getShape(),t=tds();if(!d.days)d.days={};if(!d.days[t])d.days[t]={};d.days[t].forcedProg=k;setShape(d);render()}
function shapeClear(){var d=getShape(),t=tds();if(d.days&&d.days[t]){delete d.days[t].session;delete d.days[t].duration;delete d.days[t].intensity;delete d.days[t].notes;delete d.days[t].forcedProg;setShape(d);render()}}
function shapeDelDate(date){var d=getShape();if(d.days&&d.days[date]){delete d.days[date].session;delete d.days[date].duration;delete d.days[date].intensity;delete d.days[date].notes;setShape(d);render()}}
function shapePhoto(){var inp=document.createElement("input");inp.type="file";inp.accept="image/*";inp.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){var d=getShape();if(!d.photos)d.photos=[];d.photos.push({src:ev.target.result,date:tds()});setShape(d);render()};r.readAsDataURL(f)};inp.click()}
function shapeDelPhoto(i){var d=getShape();if(d.photos)d.photos.splice(i,1);setShape(d);render()}


// EVENT DELEGATION for iOS Safari
document.addEventListener("click",function(e){
  var btn=e.target.closest("#hodlAddBtn");
  if(btn){e.preventDefault();hodlAdd();return}
  var del=e.target.closest("[data-hdel]");
  if(del){e.preventDefault();hodlDel(parseInt(del.getAttribute("data-hdel")));return}
});


function togglePalier(p){
  var arr=[];try{arr=JSON.parse(localStorage.getItem("lo_paliers")||"[]")}catch(e){arr=[]}
  var idx=arr.indexOf(p);
  if(idx>=0)arr.splice(idx,1);else arr.push(p);
  localStorage.setItem("lo_paliers",JSON.stringify(arr));
  render();
}

setTimeout(()=>{render()},400);

</script>
